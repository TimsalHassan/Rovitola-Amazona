services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - restaurant_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - restaurant_network

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn core.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      "
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    networks:
      - restaurant_network

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - backend
    command: celery -A core worker --loglevel=info
    volumes:
      - media_volume:/app/media
    networks:
      - restaurant_network

  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - backend
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - media_volume:/app/media
    networks:
      - restaurant_network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - restaurant_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    networks:
      - restaurant_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  restaurant_network: